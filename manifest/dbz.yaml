apiVersion: v1
kind: Pod
metadata:
  namespace: dbz-ns
  labels:
    run: dbz
  name: dbz
spec:
  containers:
  - image: atostrife/dbz:55
    name: dbz

---

apiVersion: v1
kind: Service
metadata:
  namespace: dbz-ns
  labels:
    run: dbz
  name: dbz
spec:
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
  selector:
    run: dbz

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  creationTimestamp: null
  name: dbz-ingress
  namespace: dbz-ns
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: dbz.syntheticpod.xyz
spec:
  ingressClassName: nginx
  rules:
  - host: dbz.syntheticpod.xyz
    http:
      paths:
      - backend:
          service:
            name: dbz
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - dbz.syntheticpod.xyz
    secretName: oecd-wildcard-internal-tls
